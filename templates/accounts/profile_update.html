<!-- подключаем основной шаблон -->
{% extends 'base.html' %}

<!-- начало контента -->
{% block content %}

<!-- заголовок -->
<h1 class="mb-4">

    Edit Profile

</h1>

<!-- отображение аватара -->
{% if user.avatar %}

    <img src="{{ user.avatar.url }}"
         width="150"
         height="150"
         class="rounded-circle mb-3">

{% endif %}

<!-- bootstrap карточка -->
<div class="card p-4">

    <!-- форма редактирования -->
    <form method="post"
          enctype="multipart/form-data">

        <!-- защита django -->
        {% csrf_token %}

        <!-- вывод полей формы -->
        {{ form.as_p }}

        <!-- кнопка сохранения -->
        <button type="submit"
                class="btn btn-primary">

            Save Changes

        </button>

        <!-- кнопка смены пароля -->
        <a href="/accounts/password-change/"
           class="btn btn-warning">

            Change Password

        </a>

    </form>

</div>

<!-- конец контента -->
{% endblock %}
