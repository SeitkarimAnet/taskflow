{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">

    Edit Profile

</h1>

<div class="card p-4">

    <form method="post" enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit"
                class="btn btn-primary">

            Save Changes

        </button>

    </form>

</div>

{% endblock %}
