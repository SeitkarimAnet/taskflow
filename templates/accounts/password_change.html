<!-- подключаем основной шаблон -->
{% extends 'base.html' %}

<!-- начало страницы -->
{% block content %}

<!-- заголовок -->
<h1 class="mb-4">

    Change Password

</h1>

<!-- bootstrap карточка -->
<div class="card p-4">

    <!-- форма изменения пароля -->
    <form method="post">

        <!-- защита django -->
        {% csrf_token %}

        <!-- вывод полей -->
        {{ form.as_p }}

        <!-- кнопка -->
        <button type="submit"
                class="btn btn-primary">

            Change Password

        </button>

    </form>

</div>

<!-- конец страницы -->
{% endblock %}
