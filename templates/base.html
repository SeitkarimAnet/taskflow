<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <!-- название сайта -->
    <title>TaskFlow</title>

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-dark">

<!-- верхняя панель -->
<nav class="navbar navbar-expand-lg navbar-dark bg-black">

    <div class="container">

        <!-- название проекта -->
        <a class="navbar-brand" href="/">

            TaskFlow

        </a>

        <div>

            <!-- если пользователь вошел -->
            {% if user.is_authenticated %}

                <!-- username -->
                <span class="text-white me-3">

                    Hello, {{ user.username }}

                </span>

                <!-- профиль -->
                <a href="/accounts/profile/"
                   class="btn btn-info">

                    Profile

                </a>

                <!-- админка -->
                <a href="/admin/"
                   class="btn btn-dark">

                    Administrator

                </a>

                <!-- выход -->
                <a href="/accounts/logout/"
                   class="btn btn-danger">

                    Logout

                </a>

            <!-- если пользователь не вошел -->
            {% else %}

                <!-- логин -->
                <a href="/accounts/login/"
                   class="btn btn-light">

                    Login

                </a>

                <!-- регистрация -->
                <a href="/accounts/register/"
                   class="btn btn-success">

                    Register

                </a>

                <!-- админка -->
                <a href="/admin/"
                   class="btn btn-dark">

                    Administrator

                </a>

            {% endif %}

        </div>

    </div>

</nav>

<!-- основной контент -->
<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
